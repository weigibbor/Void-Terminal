name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install setuptools
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package Windows
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.yml for electron-updater
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          EXE_FILE=$(ls release/*.exe | head -1)
          EXE_NAME=$(basename "$EXE_FILE")
          SHA512=$(sha512sum "$EXE_FILE" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$EXE_FILE" 2>/dev/null || stat -f%z "$EXE_FILE")
          cat > release/latest.yml << EOF
          version: ${VERSION}
          files:
            - url: ${EXE_NAME}
              sha512: ${SHA512}
              size: ${SIZE}
          path: ${EXE_NAME}
          sha512: ${SHA512}
          releaseDate: $(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          EOF

      - name: Upload to Release
        run: |
          gh release upload ${{ github.event.inputs.version }} release/*.exe release/latest.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install setuptools
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package macOS x64
        run: npx electron-builder --mac dmg --x64 --config.mac.identity=null

      - name: Upload to Release
        run: |
          gh release upload ${{ github.event.inputs.version }} release/*.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
